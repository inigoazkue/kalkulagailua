services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: kalkulagailua
      POSTGRES_USER: kalk
      POSTGRES_PASSWORD: kalk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalk -d kalkulagailua"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://kalk:kalk@db:5432/kalkulagailua
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-changeme}
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
